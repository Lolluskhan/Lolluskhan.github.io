<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In Missione</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="site-title">In <span>Missione</span></div>

    <!-- SOTTOTITOLO HEADER: breve descrizione sotto il titolo, visibile su tutte le pagine.
         Per attivarlo, rimuovi i simboli /* e */ intorno al tag <p>.
         Esempio: <p class="site-desc">Luogo virtuale un po' vecchio stile.</p> -->
    <!-- <p class="site-desc">La tua descrizione qui</p> -->

    <nav>
      <a href="index.html" class="active">Home</a>
      <a href="racconti/index.html">Racconti</a>
      <a href="viaggi/index.html">Viaggi</a>
      <a href="frammenti/index.html">Frammenti</a>
    </nav>
  </header>

  <main>

    <div class="intro">
      <!-- FRASE DI BENVENUTO: la frase grande al centro della homepage.
           Per attivarla, rimuovi i trattini dai commenti e scrivi la tua frase.
           Esempio: <h2>Scrivo per fissare le cose, per non perderle.</h2> -->
      <!-- <h2>La tua frase qui</h2> -->
    </div>

    <div class="sections-grid">
      <a href="racconti/index.html" class="section-card">
        <div class="section-card-num">I</div>
        <div class="section-card-title">Racconti</div>
        <!-- DESCRIZIONE RACCONTI: una o due righe sotto il titolo della sezione.
             Esempio: <p class="section-card-desc">Storie inventate o quasi.</p> -->
        <!-- <p class="section-card-desc">La tua descrizione qui</p> -->
      </a>
      <a href="viaggi/index.html" class="section-card">
        <div class="section-card-num">II</div>
        <div class="section-card-title">Viaggi</div>
        <!-- DESCRIZIONE VIAGGI: una o due righe sotto il titolo della sezione. -->
        <!-- <p class="section-card-desc">La tua descrizione qui</p> -->
      </a>
      <a href="frammenti/index.html" class="section-card">
        <div class="section-card-num">III</div>
        <div class="section-card-title">Frammenti</div>
        <!-- DESCRIZIONE FRAMMENTI: una o due righe sotto il titolo della sezione. -->
        <!-- <p class="section-card-desc">La tua descrizione qui</p> -->
      </a>
    </div>

    <p class="recent-label">Ultimi pubblicati</p>
    <ul class="post-list">
      <!-- LISTA ULTIMI POST: aggiungi un blocco <li> per ogni nuovo post.
           Copia il blocco qui sotto, togli i trattini del commento, e compila:
           - href="sezione/nome-file.html" → il percorso del file del post
           - il titolo tra i tag <a>
           - la categoria (Racconti / Viaggi / Frammenti)
           - la data

      <li class="post-item">
        <a href="frammenti/nome-del-file.html">Titolo del post</a>
        <div class="post-meta">
          <span class="post-cat">Frammenti</span>
          <span class="post-date">Marzo 2026</span>
        </div>
      </li>
      -->
    </ul>

  </main>

  <footer>
    <!-- FOOTER: testo in fondo a ogni pagina. Un copyright, una frase, o niente.
         Esempio: In Missione &mdash; 2026 -->
    <!-- La tua firma qui -->
  </footer>

</body>
</html>
